<div id="history-section" style="margin-top: 40px; border-top: 1px solid #333; padding-top: 20px;">
    <h2 style="font-size: 14px; color: #666;">最近の抽選履歴</h2>
    <ul id="history-list" style="list-style: none; padding: 0; font-size: 14px; color: #aaa;"></ul>
    <button onclick="clearHistory()" style="padding: 5px 15px; font-size: 12px; background: #333; color: #888; box-shadow: none;">履歴を削除</button>
</div>

<script>
// --- 履歴機能用のスクリプト ---

// ページ読み込み時に履歴を表示
window.onload = () => {
    displayHistory();
};

function saveResult(pref, city) {
    let history = JSON.parse(localStorage.getItem('rouletteHistory') || '[]');
    const now = new Date();
    const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
    
    // 新しい履歴を先頭に追加（最大10件）
    history.unshift({ name: `${pref} ${city}`, time: timeStr });
    history = history.slice(0, 10);
    
    localStorage.setItem('rouletteHistory', JSON.stringify(history));
    displayHistory();
}

function displayHistory() {
    const listEl = document.getElementById('history-list');
    const history = JSON.parse(localStorage.getItem('rouletteHistory') || '[]');
    listEl.innerHTML = history.map(item => `<li style="margin-bottom:5px;">${item.time} - <strong>${item.name}</strong></li>`).join('');
}

function clearHistory() {
    if(confirm('履歴を削除しますか？')) {
        localStorage.removeItem('rouletteHistory');
        displayHistory();
    }
}

// 抽選終了時のcallback(final)の中に以下を追記してください
// startRouletteのcallback内で呼び出す例：
// saveResult(currentPrefName, final.textContent);
</script>
